name: Deploy AI Crew

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: DEV

    steps:
      - name: Ensure data directory
        run: mkdir -p /home/github-runner/ai_crew_data

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env << 'EOF'
          APP_BASE_URL=${{ vars.APP_BASE_URL }}
          EXTRA_ALLOWED_ORIGINS=${{ vars.EXTRA_ALLOWED_ORIGINS }}
          SLACK_CONFIG_TOKEN=${{ vars.SLACK_CONFIG_TOKEN }}
          SLACK_CONFIG_REFRESH_TOKEN=${{ vars.SLACK_CONFIG_REFRESH_TOKEN }}
          SLACK_OAUTH_REDIRECT_URI=${{ vars.SLACK_OAUTH_REDIRECT_URI }}
          CHARACTER_LLM_API_KEY=${{ vars.CHARACTER_LLM_API_KEY }}
          EOF

      - name: Remove stale containers
        run: docker compose down --remove-orphans || true

      - name: Build and deploy
        run: |
          docker compose build --no-cache
          docker compose up -d

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Cleanup old images
        run: docker image prune -f
