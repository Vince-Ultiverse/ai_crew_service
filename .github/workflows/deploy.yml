name: Deploy AI Crew

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Clean Docker-owned files
        run: sudo rm -rf backend/data/agents || true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build and deploy
        run: |
          docker compose build --no-cache
          docker compose up -d

      - name: Seed templates
        run: |
          cd backend
          npm install --include=dev
          npx ts-node -r dotenv/config scripts/seed-templates.ts || true

      - name: Cleanup old images
        run: docker image prune -f
