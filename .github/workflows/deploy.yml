name: Deploy AI Crew

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: DEV

    steps:
      - name: Ensure data directory
        run: mkdir -p /home/github-runner/ai_crew_data

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env << 'EOF'
          APP_BASE_URL=${{ vars.APP_BASE_URL }}
          SLACK_CONFIG_TOKEN=${{ vars.SLACK_CONFIG_TOKEN }}
          SLACK_CONFIG_REFRESH_TOKEN=${{ vars.SLACK_CONFIG_REFRESH_TOKEN }}
          SLACK_OAUTH_REDIRECT_URI=${{ vars.SLACK_OAUTH_REDIRECT_URI }}
          EOF

      - name: Build and deploy
        run: |
          docker compose build --no-cache
          docker compose up -d

      - name: Seed templates
        run: |
          cd backend
          npm install --include=dev
          npx ts-node -r dotenv/config scripts/seed-templates.ts || true

      - name: Cleanup old images
        run: docker image prune -f
