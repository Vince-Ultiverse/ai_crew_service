<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Office - Crew Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    </style>
    <script>
      // Anti-flash: apply saved theme background before render
      (function() {
        try {
          var t = localStorage.getItem('ai-crew-theme');
          if (t === 'severance') {
            document.documentElement.style.background = '#e8ede8';
          } else {
            document.documentElement.style.background = '#f0e6d3';
          }
        } catch(e) {
          document.documentElement.style.background = '#f0e6d3';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
